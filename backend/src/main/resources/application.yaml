server:
  port: 8080
  forward-headers-strategy: native
  servlet:
    session:
      cookie:
        domain: ${SERVER_SERVLET_SESSION_COOKIE_DOMAIN}
        name: ${SERVER_SERVLET_SESSION_COOKIE_NAME}

app:
  minimised-http-servlet-logging: true
  csrf-cookie-name: ${CSRF_COOKIE_NAME}
  cookie:
    secure: ${COOKIE_SECURE:true}
    same-site: ${COOKIE_SAME_SITE:Lax}
  llm:
    base-url: ${LLM_BASE_URL:https://openrouter.ai/api/v1}
    api-key: ${LLM_API_KEY}
    timeout-seconds: ${LLM_TIMEOUT_SECONDS:60}
    referer: ${LLM_REFERER:https://sinair.net}
    title: ${LLM_TITLE:sinair-llm-bot}
    # Which tier generates replies: cheap (default) or smart (testing).
    active-reply-tier: ${LLM_ACTIVE_REPLY_TIER:cheap}
    gate-tier: gate
    tiers:
      gate:
        model: ${LLM_GATE_MODEL:google/gemini-2.5-flash-lite}
        temperature: 0
        max-tokens: 220
      cheap:
        model: ${LLM_CHEAP_MODEL:deepseek/deepseek-chat}
        temperature: 0.85
        max-tokens: 400
      smart:
        model: ${LLM_SMART_MODEL:anthropic/claude-sonnet-4}
        temperature: 0.85
        max-tokens: 500
  bot:
    enabled: ${BOT_ENABLED:false}
    rooms: '${BOT_ROOMS:#chat}'
    persona:
      name: ${BOT_NAME:segfault}
      language: Russian
      creator-user-id: ${BOT_CREATOR_USER_ID:0}
      stop-command: ${BOT_STOP_COMMAND:!stop}
      start-command: ${BOT_START_COMMAND:!start}
      prompt: >-
        You are a regular member of a small Russian-speaking tech group chat (devs who argue about
        C/C++/Rust, nginx, postgres, linux, mobile OSes and politics). You blend in as one of them.
        Personality: opinionated, witty, mildly sarcastic but fundamentally good-natured. You are
        genuinely helpful when someone has a real technical question, you crack jokes, and you can
        push back when you disagree — but keep it playful, not mean. Light teasing is fine, actual
        rudeness is not. If someone asks you nicely, asks for help sincerely, or asks you to be
        kinder — you immediately warm up and respond with genuine friendliness. You have real takes
        and defend them, but you know when to back off. You never sound like a corporate assistant,
        never lecture about being an AI, never add disclaimers. Match the chat's casual, lowercase,
        slang-heavy style. Keep replies short — usually one or two sentences. Don't reply to
        everything; only say something when it actually adds value, humor, or a strong opinion.
    decision:
      debounce-seconds: ${BOT_DEBOUNCE_SECONDS:6}
      cooldown-seconds: ${BOT_COOLDOWN_SECONDS:45}
      max-replies-per-window: ${BOT_MAX_REPLIES:8}
      window-minutes: ${BOT_WINDOW_MINUTES:30}
      spontaneous-probability: ${BOT_SPONTANEOUS_PROBABILITY:0.15}
    context:
      recent-message-count: ${BOT_RECENT_MESSAGES:25}
      summary-refresh-every-messages: ${BOT_SUMMARY_REFRESH:40}
      max-summary-chars: 1500
      max-message-chars: 600

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
      cache:
        time-to-live: 60s
      group:
        external:
          include: google
    prometheus:
      enabled: true
  info:
    git:
      enabled: true
      mode: full
    build:
      enabled: true
  metrics:
    tags:
      application: sinair-llm-bot

spring:
  profiles:
    group:
      local: plain-log
  application:
    name: sinair-llm-bot

logging:
  structured:
    format:
      console: logstash
    json:
      add:
        git_commit: "@git.commit.id.abbrev@"
        app_version: "@project.version@"
        service: ${spring.application.name}
      stacktrace:
        root: first
        max-length: 2048
        include-common-frames: false
        include-hashes: true
  level:
    WireMock: warn
