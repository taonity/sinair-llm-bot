server:
  port: 8080
  forward-headers-strategy: native
  servlet:
    session:
      timeout: 7d
      cookie:
        domain: ${SERVER_SERVLET_SESSION_COOKIE_DOMAIN}
        name: ${SERVER_SERVLET_SESSION_COOKIE_NAME}

app:
  minimised-http-servlet-logging: true
  csrf-cookie-name: ${CSRF_COOKIE_NAME}
  cookie:
    secure: ${COOKIE_SECURE:true}
    same-site: ${COOKIE_SAME_SITE:Lax}
  console:
    # Comma-separated list of Google account emails bootstrapped as data-console owners on login.
    owner-emails: ${CONSOLE_OWNER_EMAILS}
    # Comma-separated list of Google account emails bootstrapped as data-console admins on login.
    admin-emails: ${CONSOLE_ADMIN_EMAILS:}
  llm:
    base-url: https://openrouter.ai/api/v1
    api-key: ${LLM_API_KEY}
    timeout-seconds: 60
    title: sinair-llm-bot
    active-reply-tier: ${LLM_ACTIVE_REPLY_TIER:smart}
    gate-tier: gate
    # Web search for the reply tier via OpenRouter's `openrouter:web_search` server tool. Off by
    # default. The tool is only offered on time-sensitive messages (asking about latest/recent/
    # current facts); within those, the model decides whether to actually search. Each performed
    # search adds cost and latency.
    reply-web-search: ${LLM_REPLY_WEB_SEARCH:true}
    tiers:
      gate:
        model: google/gemini-2.5-flash-lite
        temperature: 0
        max-tokens: 220
      cheap:
        model: deepseek/deepseek-chat
        temperature: 0.85
        max-tokens: 400
      smart:
        model: anthropic/claude-sonnet-4
        temperature: 0.85
        max-tokens: 500
      # Multimodal tier used when a reply must analyse an explicitly linked image (see app.ingestion).
      vision:
        model: google/gemini-2.5-flash
        temperature: 0.7
        max-tokens: 500
  # URL-aware context ingestion: when a message contains a link, the bot deterministically fetches
  # and cleans that source (GitHub README / web page / direct image) before answering, and grounds
  # its reply in the extracted content. No caching in this MVP. SSRF-guarded and size-capped.
  ingestion:
    enabled: ${INGESTION_ENABLED:true}
    max-urls-per-message: 3
    fetch-timeout-seconds: 8
    max-redirects: 4
    max-page-bytes: 2000000
    max-context-chars: 6000
    max-chars-per-source: 4000
    vision-tier: vision
    image:
      # Hard byte cap so a huge image can't be pulled in; https-only, private/internal hosts blocked.
      max-bytes: 6000000
      extensions:
        - png
        - jpg
        - jpeg
        - gif
        - webp
        - bmp
  bot:
    enabled: ${BOT_ENABLED}
    rooms: '${BOT_ROOMS}'
    persona:
      name: segfault
      language: Russian
      creator-user-id: ${BOT_CREATOR_USER_ID}
      stop-command: '!stop'
      start-command: '!start'
      # Per-room commands: the bot ignores the room (drops its messages, shows away,
      # renames itself with sleep-nick-suffix) between sleep-command and wake-command.
      sleep-command: '!sleep'
      wake-command: '!wake'
      sleep-nick-suffix: '-zzz'
      aliases:
        - сега
        - сегвульт
      prompt: >-
        You are a regular member of a small Russian-speaking group chat. You blend in as one of the
        regulars — just another person hanging out, never a feature, product or assistant. You happen
        to be broadly knowledgeable: software and hardware, science, games, history, current affairs,
        everyday life — and you can go deep on any of it when a real question shows up. But you never
        advertise that, never list your interests, and never frame the chat as being "about" any
        particular topic. Personality: opinionated, witty, mildly sarcastic but fundamentally
        good-natured. You crack jokes, hold real takes and defend them, and push back when you
        disagree — playful, not mean. Light teasing is fine, actual rudeness is not. If someone asks
        for help sincerely or asks you to be kinder, you warm up immediately.

        HOW NOT TO SOUND LIKE A BOT:
        - Don't interrogate people. Avoid filler "human" follow-up questions thrown in just to seem
          engaged ("ну как тебе камера?", "стоит овчинка выделки?", "а ты что думаешь?"). Ask a
          question only when you actually need the answer to say something useful.
        - Don't fixate on one subject or keep steering the talk back to it. Follow the chat wherever
          it drifts.
        - React to what was really said and add something — a point, a joke, an answer, a sharp
          opinion — instead of restating or echoing what someone just told you.
        - Never sound like a corporate assistant, never lecture about being an AI, never add
          disclaimers.

        Match the chat's casual, lowercase, slang-heavy style. ~80% of the time keep it to one or
        two sentences (under 100 chars). When it genuinely helps — explaining something complex,
        answering a real technical question, or sharing a code snippet — go up to 300-400 chars
        freely. Don't reply to everything; speak only when you add value, humor, or a strong opinion.
    decision:
      debounce-seconds: 6
      cooldown-seconds: 30
      max-replies-per-window: 8
      window-minutes: 20
      # 0 = the bot never chimes in spontaneously; it speaks only when genuinely addressed.
      spontaneous-probability: 0
    context:
      recent-message-count: 25
      summary-refresh-every-messages: 40
      # Character cap applied to the stored summary (also stated in the summariser prompt).
      max-summary-chars: 4000
      # Output token budget for the summariser call. Overrides the gate tier's small default
      # (used for the classifier) so summaries can run long enough to cover all main topics.
      summary-max-tokens: 1200
      max-message-chars: 1500

# Exposed via /actuator/info (management.info.env.enabled). Deployment environment is a runtime
# concern (same image runs in stage and prod), so it is resolved from APP_ENVIRONMENT at startup
# rather than baked in at build time like git/build info. Defaults to 'local' for local dev.
info:
  app:
    name: ${spring.application.name}
    environment: ${APP_ENVIRONMENT:local}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
      cache:
        time-to-live: 60s
      group:
        external:
          include: google
    prometheus:
      enabled: true
  info:
    env:
      enabled: true
    git:
      enabled: true
      mode: full
    build:
      enabled: true
  metrics:
    tags:
      application: sinair-llm-bot

spring:
  profiles:
    group:
      local: plain-log
  application:
    name: sinair-llm-bot

logging:
  structured:
    format:
      console: logstash
    json:
      add:
        git_commit: "@git.commit.id.abbrev@"
        app_version: "@project.version@"
        service: ${spring.application.name}
      stacktrace:
        root: first
        max-length: 2048
        include-common-frames: false
        include-hashes: true
  level:
    WireMock: warn
