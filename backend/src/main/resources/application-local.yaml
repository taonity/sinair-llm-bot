---
logging:
  level:
#    org.taonity.sinairllmbot.observability.logging.HttpServletLoggingService: debug
    org.taonity.sinairllmbot.web.exception.GlobalExceptionHandler: debug
#    org.taonity.sinairllmbot: debug
    DB: info
#    org.springframework.security: TRACE
#    root: trace
#    org.hibernate.SQL: DEBUG
#    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
#    org.hibernate.orm.jdbc.bind: TRACE

#    org.apache.hc.client5.http.headers: DEBUG
#    org.apache.hc.client5.http.wire: DEBUG
#    org.taonity.sinairllmbot.bot.client.LlmClient: DEBUG

#debug: true

server:
  servlet:
    session:
      cookie:
        domain: 127.0.0.1
        name: JSESSIONID-LOCAL

spring:
  security:
    oauth2:
      client:
        registration:
          google-sinair-llm-bot:
            redirect-uri: http://127.0.0.1:8080/login/oauth2/code/google-sinair-llm-bot
  jpa:
    properties:
      hibernate:
        format_sql: true

app:
  csrf-cookie-name: XSRF-TOKEN-LOCAL
  cookie:
    secure: false
    same-site: Lax
  llm:
    base-url: https://openrouter.ai/api/v1
    api-key: ${LLM_API_KEY:local-dummy-key}
    active-reply-tier: cheap
  bot:
    rooms: '#test1'
    persona:
      name: segfault-local
      creator-user-id: ${BOT_CREATOR_USER_ID:0}

decorator:
  datasource:
    datasource-proxy:
      logging: slf4j
      query:
        enable-logging: false
#        enable-logging: true
        log-level: info
        logger-name: DB
      slow-query:
        enable-logging: true
        log-level: info
        logger-name: DB
        threshold: 300
      multiline: false
      format-sql: true
      json-format: false
      count-query: false

