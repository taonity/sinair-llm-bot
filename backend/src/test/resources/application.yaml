server:
  port: 8080
  forward-headers-strategy: native
  servlet:
    session:
      cookie:
        domain: 127.0.0.1
        name: JSESSIONID-TEST

spring:
  main:
    allow-bean-definition-overriding: true
  security:
    oauth2:
      client:
        registration:
          google-sinair-llm-bot:
            provider: google
            client-id: test-google-client-id
            client-secret: test-google-client-secret
            redirect-uri: http://127.0.0.1:8080/login/oauth2/code/google-sinair-llm-bot
            authorization-grant-type: authorization_code
            scope: openid,profile,email
        provider:
          google:
            authorization-uri: http://127.0.0.1:9561/oauth2/authorize
            token-uri: http://127.0.0.1:9561/oauth2/token
            user-info-uri: http://127.0.0.1:9561/oauth2/v3/userinfo

app:
  minimised-http-servlet-logging: false
  default-success-url: /
  login-url: /
  csrf-cookie-name: XSRF-TOKEN-TEST
  cookie:
    secure: false
    same-site: Lax
  llm:
    base-url: http://127.0.0.1:9999/v1
    api-key: test-key
    timeout-seconds: 60
    active-reply-tier: cheap
    gate-tier: gate
    tiers:
      gate:
        model: test/gate-model
        temperature: 0
        max-tokens: 220
      cheap:
        model: test/cheap-model
        temperature: 0.85
        max-tokens: 400
      smart:
        model: test/smart-model
        temperature: 0.85
        max-tokens: 500
  bot:
    enabled: false
    rooms: '#chat'
    persona:
      name: segfault
      language: Russian
      creator-user-id: 0
      stop-command: '!stop'
      start-command: '!start'
      prompt: test persona
    decision:
      debounce-seconds: 6
      cooldown-seconds: 45
      max-replies-per-window: 8
      window-minutes: 30
      spontaneous-probability: 0.15
    context:
      recent-message-count: 25
      summary-refresh-every-messages: 40
      max-summary-chars: 1500
      max-message-chars: 600
#logging:
#  level:
