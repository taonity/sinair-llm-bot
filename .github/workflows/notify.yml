name: Notify (ntfy)

# Reusable workflow that publishes a deployment notification to a
# self-hosted ntfy server. The target topic is access-controlled, so an
# access token is sent via the Authorization: Bearer header.

on:
  workflow_call:
    inputs:
      environment:
        description: 'Deployment environment name (e.g. stage, prod)'
        required: true
        type: string
      status:
        description: 'Result of the deploy job (success, failure, cancelled, skipped)'
        required: true
        type: string
    secrets:
      NTFY_URL:
        description: 'Base URL of the ntfy server, e.g. https://ntfy.example.com'
        required: true
      NTFY_TOPIC:
        description: 'Topic name to publish to'
        required: true
      NTFY_TOKEN:
        description: 'ntfy access token (tk_...) with write access to the topic'
        required: true

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send ntfy deployment notification
        env:
          NTFY_URL: ${{ secrets.NTFY_URL }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}
          ENVIRONMENT: ${{ inputs.environment }}
          STATUS: ${{ inputs.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [[ "$STATUS" == "success" ]]; then
            title="✅ ${ENVIRONMENT} deploy succeeded"
            priority="default"
            tags="white_check_mark,rocket"
          else
            title="❌ ${ENVIRONMENT} deploy ${STATUS}"
            priority="high"
            tags="x,rotating_light"
          fi

          curl -sSf \
            -H "Authorization: Bearer ${NTFY_TOKEN}" \
            -H "Title: ${title}" \
            -H "Priority: ${priority}" \
            -H "Tags: ${tags}" \
            -H "Click: ${RUN_URL}" \
            -d "sinair-llm-bot ${GITHUB_REF_NAME} @ ${GITHUB_SHA:0:7}" \
            "${NTFY_URL%/}/${NTFY_TOPIC}"
