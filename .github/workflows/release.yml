# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Release

on:
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip backend and front-end validation jobs for this release run'
        required: false
        type: boolean
        default: false
  push:
    branches:
      - main

jobs:
  prepare:
    concurrency:
      group: ${{ github.ref }}
      cancel-in-progress: true
    runs-on: ubuntu-latest

    outputs:
      skip_tests: ${{ steps.determine_test_mode.outputs.skip_tests }}

    steps:
    - name: Determine whether to skip tests
      id: determine_test_mode
      env:
        COMMIT_MESSAGE: ${{ github.event.head_commit.message || '' }}
        MANUAL_SKIP_TESTS: ${{ inputs.skip_tests || false }}
      run: |
        skip_tests=false

        if [[ "$MANUAL_SKIP_TESTS" == "true" || "$COMMIT_MESSAGE" == *"[skip tests]"* ]]; then
          skip_tests=true
        fi

        echo "skip_tests=$skip_tests" >> "$GITHUB_OUTPUT"
        echo "Release skip_tests=$skip_tests"

  backend-validation:
    needs: prepare
    if: needs.prepare.outputs.skip_tests != 'true'
    uses: ./.github/workflows/backend-validation.yml

  frontend-validation:
    needs: prepare
    if: needs.prepare.outputs.skip_tests != 'true'
    uses: ./.github/workflows/frontend-validation.yml

  release:
    needs:
      - prepare
      - backend-validation
      - frontend-validation
    if: ${{ always() && (needs.prepare.outputs.skip_tests == 'true' || (needs.backend-validation.result == 'success' && needs.frontend-validation.result == 'success')) }}
    permissions: write-all
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Extract back-end maven artifactId
      id: extract_backend_artifact_id
      run: |
        parentArtifactId=$(mvn -pl backend help:evaluate "-Dexpression=project.parent.artifactId" -q -DforceStdout)
        artifactId=$(mvn -pl backend help:evaluate "-Dexpression=project.artifactId" -q -DforceStdout)
        imageArtifactId="$parentArtifactId-$artifactId"
        echo "artifactId=$artifactId" >> "$GITHUB_OUTPUT"
        echo "imageArtifactId=$imageArtifactId" >> "$GITHUB_OUTPUT"
        echo "Successfully extracted artifactId $artifactId, imageArtifactId $imageArtifactId"

    - name: Extract front-end npm packageName
      id: extract_frontend_package_name
      run: |
        packageName=$(grep '"name"' frontend/package.json | head -n 1 | sed -E 's/.*"name": "([^"]+)".*/\1/')
        echo "packageName=$packageName" >> "$GITHUB_OUTPUT"
        echo "Successfully extracted packageName $packageName"

    - name: Compute next version tag
      id: github_tag_action
      uses: anothrNick/github-tag-action@1.70.0
      env:
        GITHUB_TOKEN: ${{ secrets.TAGGING_GITHUB_TOKEN }}
        WITH_V: true
        DRY_RUN: true

    - name: Extract tag
      id: extract_tag
      run: |
        raw_tag=${{ steps.github_tag_action.outputs.new_tag  }}
        tag=${raw_tag:1}
        echo "tag=$tag" >> "$GITHUB_OUTPUT"
        echo "Successfully extracted tag $tag"

    - name: Build back-end with Maven
      env:
        VERSIONING_GIT_TAG: ${{ steps.github_tag_action.outputs.new_tag }}
      run: |
        username=${{ secrets.DOCKER_USERNAME }}
        mvn -v
        mvn -B -P build-docker-image package -DskipTests -Ddocker.registry="$username"

    - name: Retag back-end docker image
      run: |
        username=${{ secrets.DOCKER_USERNAME }}
        imageArtifactId=${{ steps.extract_backend_artifact_id.outputs.imageArtifactId }}
        tag=${{ steps.extract_tag.outputs.tag }}
        docker tag "$username/$imageArtifactId:$tag" "$username/$imageArtifactId:latest"

    - name: Build front-end docker image
      run: |
        username=${{ secrets.DOCKER_USERNAME }}
        packageName=${{ steps.extract_frontend_package_name.outputs.packageName }}
        tag=${{ steps.extract_tag.outputs.tag }}
        commitSha=$(git rev-parse HEAD)
        commitShort=$(git rev-parse --short HEAD)
        branch=$(git rev-parse --abbrev-ref HEAD)
        docker build \
          --build-arg GIT_COMMIT_SHA="$commitSha" \
          --build-arg GIT_COMMIT_SHORT="$commitShort" \
          --build-arg GIT_BRANCH="$branch" \
          -t "$username/$packageName" -t "$username/$packageName:$tag" frontend/

    - name: Login to DockerHub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Push front-end image to DockerHub
      run: |
        username=${{ secrets.DOCKER_USERNAME }}
        packageName=${{ steps.extract_frontend_package_name.outputs.packageName }}
        tag=${{ steps.extract_tag.outputs.tag }}
        docker push "$username/$packageName:$tag"
        docker push "$username/$packageName:latest"

    - name: Push back-end image to DockerHub
      run: |
        username=${{ secrets.DOCKER_USERNAME }}
        imageArtifactId=${{ steps.extract_backend_artifact_id.outputs.imageArtifactId }}
        tag=${{ steps.extract_tag.outputs.tag }}
        docker push "$username/$imageArtifactId:$tag"
        docker push "$username/$imageArtifactId:latest"

    - name: Push version tag
      run: |
        raw_tag=${{ steps.github_tag_action.outputs.new_tag }}
        git tag "$raw_tag"
        git push origin "$raw_tag"
      env:
        GITHUB_TOKEN: ${{ secrets.TAGGING_GITHUB_TOKEN }}

  update-erd:
    needs: release
    uses: ./.github/workflows/update-erd.yml
    with:
      force_generate: false
    permissions:
      contents: write

  deploy-stage:
    needs: release
    uses: taonity/docker-webhook/.github/workflows/deploy.yml@main
    with:
      project_name: fullstack-starter
      environment: stage
    secrets:
      WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
      WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}

  approve-prod:
    needs: deploy-stage
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Approved for production
        run: echo "Production deployment approved"

  deploy-prod:
    needs: approve-prod
    uses: taonity/docker-webhook/.github/workflows/deploy.yml@main
    with:
      project_name: fullstack-starter
      environment: prod
    secrets:
      WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
      WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}



