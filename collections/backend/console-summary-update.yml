info:
  name: /console/summaries/:id
  type: http
  seq: 30

http:
  method: PUT
  url: "{{backendBaseUrl}}/console/summaries/1"
  headers:
    - name: Content-Type
      value: application/json
    - name: Cookie
      value: "{{cookies}}"
    - name: X-XSRF-TOKEN
      value: "{{xsrfToken}}"
  body:
    type: json
    data: |-
      {
        "summary": "Updated room summary"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
