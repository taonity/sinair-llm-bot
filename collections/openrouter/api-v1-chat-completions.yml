info:
  name: /api/v1/chat/completions
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/api/v1/chat/completions"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "model": "anthropic/claude-sonnet-4",
        "messages": [
          {
            "role": "user",
            "content": "Опиши все что знаешь о minecraft galaxy"
          }
        ]
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
