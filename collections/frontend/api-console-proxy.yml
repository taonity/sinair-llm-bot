info:
  name: /api/console/* (proxy)
  type: http
  seq: 15

http:
  method: GET
  url: "{{frontendUrl}}/api/console/access/me"
  headers:
    - name: Cookie
      value: "{{cookies}}"
  auth: inherit

docs: |-
  Catch-all proxy to the backend /console/** endpoints (src/app/api/console/[...path]/route.ts).
  Change the path after /api/console/ and the method to reach any console endpoint, e.g.:
    GET    /api/console/chat-messages
    DELETE /api/console/chat-messages/{id}
    PUT    /api/console/summaries/{id}
  Mutating requests also require the X-XSRF-TOKEN header ({{xsrfToken}}).

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
